AWSTemplateFormatVersion: "2010-09-09"
Description: BidIt CloudFormation infrastructure for DynamoDB, S3, Lambda, API Gateway, and Step Functions.

Parameters:
  StageName:
    Type: String
    Default: dev
  LambdaArtifactBucket:
    Type: String
    Description: S3 bucket containing packaged Lambda zip files.
  LambdaArtifactPrefix:
    Type: String
    Default: bidit-lambdas
  ImagesBucketName:
    Type: String
    Description: Globally unique S3 bucket name for auction and profile images.
  UseExistingLabRole:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
  ExistingLabRoleArn:
    Type: String
    Default: ""
    Description: Existing IAM role ARN such as AWS Academy LabRole when UseExistingLabRole is true.
  AgoraAppId:
    Type: String
    Default: ""
    NoEcho: true
  AgoraAppCertificate:
    Type: String
    Default: ""
    NoEcho: true

Conditions:
  UseExistingRole: !Equals [!Ref UseExistingLabRole, "true"]
  CreateRoles: !Not [!Condition UseExistingRole]

Resources:
  AuctionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Auctions
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auctionId
          AttributeType: S
      KeySchema:
        - AttributeName: auctionId
          KeyType: HASH
  BidsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Bids
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: auctionId
          AttributeType: S
        - AttributeName: placedAt
          AttributeType: S
        - AttributeName: bidderId
          AttributeType: S
      KeySchema:
        - AttributeName: auctionId
          KeyType: HASH
        - AttributeName: placedAt
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: bidderId-placedAt-index
          KeySchema:
            - AttributeName: bidderId
              KeyType: HASH
            - AttributeName: placedAt
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
  NotificationsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Notifications
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: notificationId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: notificationId
          KeyType: RANGE
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
  ImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref ImagesBucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ["*"]
            AllowedMethods: [GET, PUT, POST, HEAD]
            AllowedHeaders: ["*"]
            ExposedHeaders: [ETag]
            MaxAge: 3000
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Condition: CreateRoles
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BidItLambdaAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [dynamodb:GetItem, dynamodb:PutItem, dynamodb:UpdateItem, dynamodb:DeleteItem, dynamodb:Query, dynamodb:Scan]
                Resource:
                  - !GetAtt AuctionsTable.Arn
                  - !GetAtt BidsTable.Arn
                  - !Sub "${BidsTable.Arn}/index/*"
                  - !GetAtt NotificationsTable.Arn
                  - !GetAtt UsersTable.Arn
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject]
                Resource: !Sub "${ImagesBucket.Arn}/*"
              - Effect: Allow
                Action: states:StartExecution
                Resource: !Sub "arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:WinnerMachine"
  StepFunctionsRole:
    Type: AWS::IAM::Role
    Condition: CreateRoles
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: states.amazonaws.com}
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BidItStepFunctionsInvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt CheckAuctionStatusFunction.Arn
                  - !GetAtt ProcessAuctionWinnerFunction.Arn
  CreateAuctionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: createAuction
      Runtime: python3.11
      Handler: createAuction.lambda_handler
      Role: !If [UseExistingRole, !Ref ExistingLabRoleArn, !GetAtt LambdaExecutionRole.Arn]
      Timeout: 30
      MemorySize: 256
      Code:
        S3Bucket: !Ref LambdaArtifactBucket
        S3Key: !Sub "${LambdaArtifactPrefix}/createAuction.zip"
      Environment:
        Variables:
          AUCTIONS_TABLE_NAME: !Ref AuctionsTable
          BIDS_TABLE_NAME: !Ref BidsTable
          NOTIFICATIONS_TABLE_NAME: !Ref NotificationsTable
          USERS_TABLE_NAME: !Ref UsersTable
          IMAGES_BUCKET_NAME: !Ref ImagesBucket
          STATE_MACHINE_ARN: !Sub "arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:WinnerMachine"
          AGORA_APP_ID: !Ref AgoraAppId
          AGORA_APP_CERT: !Ref AgoraAppCertificate
