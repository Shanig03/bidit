          AGORA_APP_CERT: !Ref AgoraAppCertificate

  WinnerMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: WinnerMachine
      RoleArn: !If [UseExistingRole, !Ref ExistingLabRoleArn, !GetAtt StepFunctionsRole.Arn]
      DefinitionString: !Sub |
        {
          "StartAt": "CheckDynamoDB",
          "States": {
            "CheckDynamoDB": {"Type": "Task", "Resource": "${CheckAuctionStatusFunction.Arn}", "Next": "IsAuctionOver"},
            "IsAuctionOver": {"Type": "Choice", "Choices": [{"Variable": "$.isAuctionOver", "BooleanEquals": true, "Next": "ProcessWinner"}], "Default": "SleepUntilEnd"},
            "SleepUntilEnd": {"Type": "Wait", "TimestampPath": "$.endTime", "Next": "CheckDynamoDB"},
            "ProcessWinner": {"Type": "Task", "Resource": "${ProcessAuctionWinnerFunction.Arn}", "End": true}
          }
        }
